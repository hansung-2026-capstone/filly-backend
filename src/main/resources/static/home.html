<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filly - 홈</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f0eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      width: 360px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    .logo { font-size: 2.5rem; margin-bottom: 8px; }
    h1 { font-size: 1.5rem; color: #2d2d2d; margin-bottom: 4px; }
    .sub { color: #888; font-size: 0.9rem; margin-bottom: 32px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      transition: opacity .15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #6c5ce7; color: #fff; }
    .btn-google  { background: #fff; color: #444; border: 1.5px solid #ddd; }
    .btn-kakao   { background: #fee500; color: #3d1f1f; }
    .btn-naver   { background: #03c75a; color: #fff; }
    .token-box {
      background: #f8f7ff;
      border: 1px solid #e0ddf8;
      border-radius: 8px;
      padding: 10px 14px;
      text-align: left;
      margin-top: 24px;
      word-break: break-all;
    }
    .token-box label { font-size: 0.75rem; color: #6c5ce7; font-weight: 700; }
    .token-box p { font-size: 0.72rem; color: #555; margin-top: 4px; line-height: 1.4; }
    .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }
    #status { font-size: 0.88rem; color: #2d9b6f; margin-bottom: 16px; min-height: 20px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">📔</div>
  <h1>Filly</h1>
  <p class="sub">나만의 AI 감성 일기</p>

  <p id="status"></p>

  <!-- 로그인 상태에 따라 동적으로 교체 -->
  <div id="logged-in" style="display:none">
    <a class="btn btn-primary" href="/diary-write.html">✏️ 일기 작성하기</a>
    <button class="btn" style="background:#f5f0eb;color:#555" onclick="logout()">로그아웃</button>
    <div class="token-box">
      <label>ACCESS TOKEN (localStorage)</label>
      <p id="token-preview">—</p>
    </div>
  </div>

  <div id="logged-out">
    <a class="btn btn-google" href="/oauth2/authorization/google">🔵 Google로 로그인</a>
    <a class="btn btn-kakao"  href="/oauth2/authorization/kakao">💛 카카오로 로그인</a>
    <a class="btn btn-naver"  href="/oauth2/authorization/naver">🟢 네이버로 로그인</a>
  </div>
</div>

<script>
  (function init() {
    // URL 파라미터에서 토큰 추출 (OAuth2 리다이렉트 직후)
    const params = new URLSearchParams(window.location.search);
    const accessToken  = params.get('accessToken');
    const refreshToken = params.get('refreshToken');

    if (accessToken) {
      localStorage.setItem('accessToken', accessToken);
      if (refreshToken) localStorage.setItem('refreshToken', refreshToken);
      // URL에서 토큰 파라미터 제거 (보안)
      history.replaceState({}, '', '/home.html');
    }

    const stored = localStorage.getItem('accessToken');
    if (stored) {
      showLoggedIn(stored);
    } else {
      document.getElementById('logged-out').style.display = 'block';
    }
  })();

  function showLoggedIn(token) {
    document.getElementById('status').textContent = '✅ 로그인되었습니다';
    document.getElementById('logged-in').style.display  = 'block';
    document.getElementById('logged-out').style.display = 'none';
    // 토큰 앞 40자만 표시
    document.getElementById('token-preview').textContent = token.slice(0, 40) + '…';
  }

  function logout() {
    localStorage.removeItem('accessToken');
    localStorage.removeItem('refreshToken');
    location.reload();
  }
</script>
</body>
</html>
